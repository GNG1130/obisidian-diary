<!-- 跨片段說明框 -->
<rect x="120" y="238" width="440" height="28" rx="6" fill="none" stroke="var(--color-text-tertiary)" stroke-width="0.5" stroke-dasharray="4 3" style="fill:none;stroke:rgb(115, 114, 108);color:rgb(0, 0, 0);stroke-width:0.5px;stroke-dasharray:4px, 3px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:20px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
<text x="340" y="256" text-anchor="middle" font-size="11" style="fill:rgb(61, 61, 58);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:20px;font-weight:400;text-anchor:middle;dominant-baseline:auto">⚠ 跨片段限制：屬性一來自 C1，屬性二三來自 C2，須整合兩篇不同論文</text>

