  <text x="539" y="123" text-anchor="middle" dominant-baseline="central" font-size="10" style="fill:rgb(153, 60, 29);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:20px;font-weight:400;text-anchor:middle;dominant-baseline:central">屬性三｜片段 C2</text>
</g>

